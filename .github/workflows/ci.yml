name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --prefix client
      - run: npm install --prefix server
      - run: npm run build --prefix client
      - run: npm test --prefix server
      - run: npm run test:e2e --prefix server
      - run: docker build -f infrastructure/docker/Dockerfile.server -t kujuatime-server:ci .
      - run: docker build -f infrastructure/docker/Dockerfile.client -t kujuatime-client:ci .
