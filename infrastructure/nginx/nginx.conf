events {
  worker_connections 1024;
}

http {
  # Zero-copy file transfer — biggest single win for video throughput
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # Cache open file descriptors — avoids a disk stat on every request
  open_file_cache max=1000 inactive=30s;
  open_file_cache_valid 60s;
  open_file_cache_min_uses 2;
  open_file_cache_errors on;

  upstream client_upstream {
    server client:80;
  }

  upstream server_upstream {
    server server:5000;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 1024m;

    # SSE live stream — must come before /api/ to disable buffering
    location /api/live/ {
      proxy_pass http://server_upstream/api/live/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization $http_authorization;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 86400s;
      chunked_transfer_encoding on;
    }

    location /api/ {
      proxy_pass http://server_upstream/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Images — immutable because filenames are timestamp-unique
    # root /var/ + URI /uploads/foo.webp = /var/uploads/foo.webp
    location ~* /uploads/.*\.(jpg|jpeg|png|webp|gif|avif)$ {
      root /var/;
      gzip off;
      add_header Cache-Control "public, max-age=31536000, immutable";
      add_header X-Content-Type-Options nosniff;
      types {
        image/jpeg jpeg jpg;
        image/png  png;
        image/webp webp;
        image/gif  gif;
        image/avif avif;
      }
    }

    # Videos — immutable + byte-range streaming via sendfile
    # root /var/ + URI /uploads/foo.mp4 = /var/uploads/foo.mp4
    location /uploads/ {
      root /var/;
      gzip off;
      add_header Accept-Ranges bytes;
      add_header Cache-Control "public, max-age=31536000, immutable";
      add_header X-Content-Type-Options nosniff;
      types {
        video/mp4  mp4;
        video/webm webm;
        video/ogg  ogv;
        image/jpeg jpeg jpg;
        image/png  png;
        image/webp webp;
        image/gif  gif;
      }
    }

    location /health {
      proxy_pass http://server_upstream/health;
    }

    location / {
      proxy_pass http://client_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
